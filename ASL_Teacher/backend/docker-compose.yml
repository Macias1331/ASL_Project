version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=asl_admin
      - POSTGRES_PASSWORD=asl_secure_password
      - POSTGRES_DB=asl_teacher_db
    ports:
      - "5432:5432"

volumes:
  postgres_data:
